# Analyst Swarm Configuration
# Copy to config.local.yaml and customize for your deployment

# LLM Provider: "claude", "claude_cli", or "ollama"
#   claude     = Claude API (requires ANTHROPIC_API_KEY, you pay per token)
#   claude_cli = Claude Code CLI (uses your company subscription, no API credits needed)
#   ollama     = Local LLM via Ollama
llm_provider: "claude_cli"

# Claude API settings (used when llm_provider: "claude")
claude:
  api_key: ""  # Set via ANTHROPIC_API_KEY env var or here
  model: "claude-sonnet-4-20250514"  # or claude-opus-4-20250514 for highest quality
  max_tokens: 8192

# Claude CLI settings (used when llm_provider: "claude_cli")
# Requires `claude` CLI installed and authenticated on the host/container
claude_cli:
  binary: "claude"  # Path to claude binary
  model: ""  # Empty = use default model. Or: "sonnet", "opus", "haiku"

# Ollama settings (used when llm_provider: "ollama")
ollama:
  base_url: "http://192.168.1.160:11434"  # Ollama server URL
  model: "qwen3:32b"  # Best balance of quality and speed for financial analysis
  max_tokens: 8192

# Backend API
backend_url: "http://backend:8000/api/v1"

# Schedule (cron expressions, timezone Europe/Helsinki)
schedule:
  - "0 7 * * *"    # 7:00 AM
  - "0 12 * * *"   # 12:00 PM
  - "0 19 * * *"   # 7:00 PM

# Telegram brief type per schedule slot (must match schedule array length)
#   morning = full analysis brief
#   midday  = diff vs morning brief (what changed)
#   evening = day wrap-up with forward outlook
brief_types:
  - "morning"
  - "midday"
  - "evening"

# Which agents to run (order matters — portfolio-manager runs last)
agents:
  - research-analyst
  - risk-manager
  - quant-analyst
  - macro-strategist
  - fixed-income-analyst
  - tax-strategist
  - technical-analyst
  - compliance-officer
  - portfolio-manager  # Always last — synthesizes all inputs

# Parallel execution: how many agents run simultaneously
# Set to 1 for local LLMs with limited VRAM
max_parallel: 4

# Pipeline refresh: run all data pipelines before analyst swarm
refresh_pipelines: true
pipelines:
  - yahoo_daily_prices
  - ecb_fx_rates
  - fred_macro_indicators
  - ecb_macro_indicators
  - yahoo_dividends
  - google_news
  - regional_news
  - openinsider
  - nasdaq_nordic_insider
  - fi_se_insider
  - yahoo_fundamentals

# Pipeline wait timeout (seconds)
pipeline_timeout: 300

# Nighttime research-only runs (watchlist rotation, 20 items per batch)
# Runs research-analyst only, rotating through watchlist items
research_schedule:
  - "0 1 * * *"    # 01:00 AM
  - "0 3 * * *"    # 03:00 AM
  - "0 5 * * *"    # 05:00 AM

# ── Model optimization settings ──
# These improve analysis quality for smaller local models (gemma4, qwen3).
# For Claude CLI/API, defaults are fine (digest_data: true is beneficial for all).

# Pre-digest API data into readable text (vs raw JSON dumps)
# Recommended for all providers — reduces prompt noise
digest_data: false

# Use shortened agent definitions (for smaller models)
# Strips verbose methodology text, keeps role + output format
short_prompts: false

# Per-security execution for research-analyst and technical-analyst
# Instead of one massive prompt, loops through each security individually
per_security:
  enabled: false       # Set true for local models
  batch_size: 1        # Securities per LLM call (1 for gemma4, 3-5 for Claude)
  timeout_per_call: 180  # Seconds per individual call
  max_concurrent: 1    # Parallel per-security calls (limited by GPU VRAM)

      tags: [InsiderInstitutional]
      parameters:
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
        - $ref: '#/components/parameters/QuerySecurityId'
        - $ref: '#/components/parameters/QueryFromDate'
        - $ref: '#/components/parameters/QueryToDate'
      responses:
        '200':
          description: Paginated insider trade list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InsiderTrade'
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # ---------------------------------------------------------------------------
  # Recommendations
  # ---------------------------------------------------------------------------
  /recommendations:
    get:
      operationId: listRecommendations
      summary: List analyst recommendations
      tags: [Recommendations]
      parameters:
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
        - $ref: '#/components/parameters/QuerySecurityId'
      responses:
        '200':
          description: Paginated recommendation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recommendation'
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # ---------------------------------------------------------------------------
  # Nordnet Import
  # ---------------------------------------------------------------------------
  /nordnet/import:
    post:
      operationId: importNordnetTransactions
      summary: Import transactions from Nordnet CSV export
      tags: [NordnetImport]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [accountId, file]
              properties:
                accountId:
                  type: integer
                  format: int64
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NordnetImportResult'
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ---------------------------------------------------------------------------
  # Global Events
  # ---------------------------------------------------------------------------
  /global-events:
    get:
      operationId: listGlobalEvents
      summary: List global economic and market events
      tags: [GlobalEvents]
      parameters:
        - $ref: '#/components/parameters/QueryLimit'
        - $ref: '#/components/parameters/QueryOffset'
        - $ref: '#/components/parameters/QueryFromDate'
        - $ref: '#/components/parameters/QueryToDate'
        - name: importance
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [low, medium, high, critical]
          style: form
          explode: true
        - name: country
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated global events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/GlobalEvent'
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # ---------------------------------------------------------------------------
  # Reports (F12)
  # ---------------------------------------------------------------------------
  /reports/tax/{year}:
    get:
      operationId: getTaxReport
      summary: Generate annual tax report
      tags: [Reports]
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Annual tax report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AnnualTaxSummary'
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'
        '400':
          $ref: '#/components/responses/BadRequest'

  /reports/performance:
    get:
      operationId: getPerformanceReport
      summary: Performance attribution report
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/QueryFromDate'
        - $ref: '#/components/parameters/QueryToDate'
        - $ref: '#/components/parameters/QueryAccountId'
      responses:
        '200':
          description: Performance report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PerformanceData'
                  meta:
                    $ref: '#/components/schemas/ResponseMeta'

  /reports/transactions/export:
    get:
      operationId: exportTransactions
      summary: Export transactions as CSV
      tags: [Reports]
      parameters:
        - $ref: '#/components/parameters/QueryAccountId'
        - $ref: '#/components/parameters/QueryFromDate'
        - $ref: '#/components/parameters/QueryToDate'
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'

services:
  db:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warren}
      POSTGRES_USER: ${POSTGRES_USER:-warren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warren}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warren} -d ${POSTGRES_DB:-warren}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - TZ=Europe/Helsinki
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=
    restart: unless-stopped

  # Scheduled pipeline runs using APScheduler
  cron:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=Europe/Helsinki
    command: ["python", "cron_scheduler.py"]
    restart: unless-stopped

  # AI Analyst Swarm — runs 9 analysts + portfolio manager on schedule
  # Configure via analyst-swarm/config.local.yaml or env vars
  analyst-swarm:
    build: ./analyst-swarm
    depends_on:
      backend:
        condition: service_started
    environment:
      - TZ=Europe/Helsinki
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-claude_cli}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-}
      - BACKEND_URL=http://backend:8000/api/v1
      - MAX_PARALLEL=${MAX_PARALLEL:-4}
    volumes:
      - ./.claude/agents:/app/agents:ro
      - ./analyst-swarm/config.local.yaml:/app/config.local.yaml:ro
      # Mount Claude auth for claude_cli provider (company subscription)
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.claude.json:/root/.claude.json:ro
    restart: unless-stopped

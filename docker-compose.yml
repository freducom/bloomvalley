services:
  db:
    image: timescale/timescaledb:latest-pg16
    # No host port — only reachable via Docker network (fixes SECURITY.md #2)
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warren}
      POSTGRES_USER: ${POSTGRES_USER:-warren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warren}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warren} -d ${POSTGRES_DB:-warren}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No host port — only reachable via Docker network (fixes SECURITY.md #3)
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"  # Localhost only — not exposed to LAN (fixes SECURITY.md #5)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    environment:
      - TZ=Europe/Helsinki
      - LLM_PROVIDER=${LLM_PROVIDER:-claude_cli}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-}
      - CLAUDE_CLI_MODEL=${CLAUDE_CLI_MODEL:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.1.160:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"  # Traefik routes here via 172.17.0.1 — cannot remove without shared Docker network
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=
      - API_KEY=${API_KEY:-}
    restart: unless-stopped

  # Scheduled pipeline runs using APScheduler
  cron:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=Europe/Helsinki
    command: ["python", "cron_scheduler.py"]
    restart: unless-stopped

  # AI Analyst Swarm — runs 9 analysts + portfolio manager on schedule
  # Configure via analyst-swarm/config.local.yaml or env vars
  analyst-swarm:
    build: ./analyst-swarm
    depends_on:
      backend:
        condition: service_started
    environment:
      - TZ=Europe/Helsinki
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-claude_cli}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.1.160:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:26b}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-}
      - BACKEND_URL=http://backend:8000/api/v1
      - API_KEY=${API_KEY:-}
      - MAX_PARALLEL=${MAX_PARALLEL:-1}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./.claude/agents:/app/agents:ro
      - ./analyst-swarm/config.local.yaml:/app/config.local.yaml:ro
      # Mount Claude auth for claude_cli provider (company subscription)
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    restart: unless-stopped
